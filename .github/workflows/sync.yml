name: Sync Guild Data

on:
  schedule:
    - cron: '0 8,10,12,14,16,18,20,22 * * *'  # every 2h, 10:00–00:00 CEST
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2

      - name: Run sync
        env:
          RUBY_BOT_TOKEN: ${{ secrets.RUBY_BOT_TOKEN }}
          GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID }}
          SOLO_BUILD_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.SOLO_BUILD_SHOWCASE_CHANNEL_FORUM_ID }}
          BOT_CHANNEL_ID: ${{ secrets.BOT_CHANNEL_ID }}
          GENERAL_CHANNEL_ID: ${{ secrets.GENERAL_CHANNEL_ID }}
        run: task sync

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/guilds.json data/solos.json web/public/guilds.json data/last_sync.json
          git commit -m "chore: auto-sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
