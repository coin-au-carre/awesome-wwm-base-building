name: Sync Guild Data

on:
  schedule:
    - cron: '0 7 * * *'  # 7:00 UTC
    - cron: '0 19 * * *'  # 19:00 UTC
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2

      - name: Run sync
        env:
          RUBY_BOT_TOKEN: ${{ secrets.RUBY_BOT_TOKEN }}
          GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID }}
          BOT_CHANNEL_ID: ${{ secrets.BOT_CHANNEL_ID }}
        run: task sync

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guilds.json solos.json
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping commit."
          else
            git commit -m "chore: auto-sync $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi