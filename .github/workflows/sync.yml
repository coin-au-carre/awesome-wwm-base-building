name: Sync Guild Data

on:
  schedule:
    - cron: '34 */2 * * *'  # every 2h, 10:00–00:00 CEST
  workflow_dispatch:       # manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run sync
        env:
          RUBY_BOT_TOKEN: ${{ secrets.RUBY_BOT_TOKEN }}
          GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID }}
          SOLO_BUILD_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.SOLO_BUILD_SHOWCASE_CHANNEL_FORUM_ID }}
          BOT_CHANNEL_ID: ${{ secrets.BOT_CHANNEL_ID }}
          GENERAL_CHANNEL_ID: ${{ secrets.GENERAL_CHANNEL_ID }}
          WHATEVER_SHOWCASE_CHANNEL_ID: ${{ secrets.WHATEVER_SHOWCASE_CHANNEL_ID }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: task sync

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add data/guilds.json data/solos.json web/public/guilds.json data/last_sync.json web/src/content/articles/
          git commit -m "chore: auto-sync $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
