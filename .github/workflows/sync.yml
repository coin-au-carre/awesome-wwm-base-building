name: Sync Guild Data

on:
  schedule:
    - cron: '34 */1 * * *'
  workflow_dispatch:       # manual trigger from GitHub UI or bot
    inputs:
      discord_trigger:
        description: 'Triggered from Discord bot (suppresses cmd/sync progress, keeps final summary)'
        default: 'false'

concurrency:
  group: sync-guild-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run sync
        env:
          RUBY_BOT_TOKEN: ${{ secrets.RUBY_BOT_TOKEN }}
          GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.GUILD_BASE_SHOWCASE_CHANNEL_FORUM_ID }}
          SOLO_BUILD_SHOWCASE_CHANNEL_FORUM_ID: ${{ secrets.SOLO_BUILD_SHOWCASE_CHANNEL_FORUM_ID }}
          BOT_CHANNEL_ID: ${{ secrets.BOT_CHANNEL_ID }}
          GENERAL_CHANNEL_ID: ${{ secrets.GENERAL_CHANNEL_ID }}
          ANNOUNCEMENTS_CHANNEL_ID: ${{ secrets.ANNOUNCEMENTS_CHANNEL_ID }}
          WHATEVER_SHOWCASE_CHANNEL_ID: ${{ secrets.WHATEVER_SHOWCASE_CHANNEL_ID }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          BLUEPRINT_CHANNEL_FORUM_ID: ${{ secrets.BLUEPRINT_CHANNEL_FORUM_ID }}
          INTERIOR_DESIGN_CHANNEL_FORUM_ID: ${{ secrets.INTERIOR_DESIGN_CHANNEL_FORUM_ID }}
          BUGS_CHANNEL_ID: ${{ secrets.BUGS_CHANNEL_ID }}
          BUGS_MESSAGE_ID: ${{ secrets.BUGS_MESSAGE_ID }}
          UPDATES_CHANNEL_ID: ${{ secrets.UPDATES_CHANNEL_ID }}
          UPDATES_MESSAGE_ID: ${{ secrets.UPDATES_MESSAGE_ID }}
          DISCORD_TRIGGER: ${{ inputs.discord_trigger }}
        run: task sync

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add data/guilds.json data/solos.json data/blueprints.json data/interior.json data/users.json data/reactions.json data/bugs.json data/patches.json data/whatever.json web/public/guilds.json data/last_sync.json data/nav-versions.json web/src/content/articles/
          git commit -m "chore: auto-sync $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
