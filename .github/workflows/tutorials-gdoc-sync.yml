name: Sync Tutorials (Google Docs)

on:
  workflow_dispatch:

concurrency:
  group: sync-tutorials-gdoc
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tutorial gdoc sync
        run: task tutorial:gdoc

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add web/src/content/articles/ web/public/tutorials/
          git commit -m "chore: sync tutorials $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
