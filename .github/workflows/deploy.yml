name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── Main branch (root site) ───────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: web

      - name: Build main site
        run: npm run build
        working-directory: web
        # → web/dist/ at base /awesome-wwm-base-building

      # ── Dev branch (beta preview) ─────────────────────────────
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: _dev

      - name: Install dev branch deps
        run: npm ci
        working-directory: _dev/web

      - name: Build beta site
        run: npm run build
        working-directory: _dev/web
        env:
          ASTRO_BASE: /awesome-wwm-base-building/beta
        # → _dev/web/dist/ at base /awesome-wwm-base-building/beta

      # ── Merge outputs ─────────────────────────────────────────
      # Beta build output is placed into web/dist/beta/ so both
      # live under the same Pages artifact root.
      - name: Merge beta into main dist
        run: |
          mkdir -p web/dist/beta
          cp -r _dev/web/dist/* web/dist/beta/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
