# Taskfile.yml
version: '3'

tasks:
  # ── discord sync (one-shot) ─────────────────────────────────
  sync:
    desc: git pull, crawl Discord threads → update guilds.json, generate public JSON, sync tutorials
    cmds:
      - git pull
      - go run ./cmd/sync {{.CLI_ARGS}}
      - go run ./cmd/genjson
      - go run ./cmd/tutorial -list data/tutorial_threads.txt

  sync:nopull:
    desc: crawl Discord threads → update guilds.json, generate public JSON, sync tutorials (no git pull)
    cmds:
      - go run ./cmd/sync {{.CLI_ARGS}}
      - go run ./cmd/genjson
      - go run ./cmd/tutorial -list data/tutorial_threads.txt

  # ── bot (long-running) ──────────────────────────────────────
  bot:
    desc: run the bot (responds on RUBY_CHANNEL_ID and DEV_CHANNEL_ID)
    cmd: go run ./cmd/bot {{.CLI_ARGS}}

  bot:no-claude:
    desc: run the bot without Claude responses (slash commands only)
    cmd: go run ./cmd/bot -no-claude {{.CLI_ARGS}}

  bot:ollama:
    desc: run the bot with local Ollama (Qwen 2.5 7B Instruct)
    cmd: go run ./cmd/bot -ollama -ollama-model qwen2.5:7b-instruct-q5_K_M {{.CLI_ARGS}}

  bot:mistral:
    desc: run the bot with Mistral 7B Instruct
    cmd: go run ./cmd/bot -ollama -ollama-model mistral:7b-instruct-q5_K_M {{.CLI_ARGS}}

  # ── voter analysis (one-shot) ───────────────────────────────
  analyze:
    desc: "fetch guild reactions → data/voter_analysis.csv + data/voter_analysis.html"
    cmd: go run ./cmd/analyze {{.CLI_ARGS}}

  # ── abuse detection (offline) ───────────────────────────────
  check-abuse:
    desc: "detect concentrated voting from data/reactions.json (no Discord required)"
    cmd: go run ./cmd/check-abuse {{.CLI_ARGS}}

  # ── events sync (one-shot) ──────────────────────────────────
  events-sync:
    desc: fetch Discord Scheduled Events → data/events.json
    cmd: go run ./cmd/events-sync {{.CLI_ARGS}}

  # ── send (one-shot message as Ruby) ────────────────────────
  send:
    desc: "send a message (or image) as Ruby. Usage: task send -- [-channel <id>] [-image path] \"text\""
    cmd: go run ./cmd/send {{.CLI_ARGS}}

  # ── spotlight (random guild image post) ─────────────────────
  spotlight:
    desc: "post a guild screenshot to the Ruby channel. Use -- -guild <name> for a specific guild"
    cmd: go run ./cmd/spotlight {{.CLI_ARGS}}

  # ── event-show (post upcoming events) ──────────────────────
  event-show:
    desc: "post events starting in the next 4 hours to Discord. Use -- -dev for DEV_CHANNEL_ID"
    cmd: go run ./cmd/event-show {{.CLI_ARGS}}

  # ── react (seed emoji reactions on forum posts) ────────────
  react:
    desc: "add 👍 🔥 ❤️ ⭐ to the first post of every thread in the guild or solo forum. Use -- -solo for solo channel"
    cmd: go run ./cmd/react {{.CLI_ARGS}}

  # ── purge-commands (one-shot Discord command cleanup) ───────
  bot:purge-commands:
    desc: delete all registered Discord slash commands (global + guild), then restart bot to re-register
    cmd: go run ./cmd/purge-commands {{.CLI_ARGS}}

  # ── announce (test general-channel announcement card) ────────
  announce:
    desc: "test-post a new-guild announcement card. Usage: task announce -- -guild <name> [-channel <id>] [-solo] [-screenshots]"
    cmd: go run ./cmd/announce {{.CLI_ARGS}}


  # ── tutorial (generate article from Discord thread) ─────────
  tutorial:
    desc: "generate a markdown tutorial from a Discord thread URL. Usage: task tutorial -- <url>"
    cmd: go run ./cmd/tutorial {{.CLI_ARGS}}

  # ── web (Astro) ─────────────────────────────────────────────
  web:
    desc: start Astro dev server (http://localhost:4321)
    dir: web
    cmd: npm run dev

  web:build:
    desc: build Astro site for production (outputs to web/dist/)
    dir: web
    cmd: npm run build

  web:preview:
    desc: preview the production Astro build locally
    dir: web
    cmd: npm run preview

  # ── dev / ci ────────────────────────────────────────────────
  test:
    desc: run unit tests
    cmd: go test ./... {{.CLI_ARGS}}

  vet:
    desc: run go vet on all packages
    cmd: go vet ./...

  push:
    desc: vet, test, then push
    deps: [vet, test]
    cmd: git push {{.CLI_ARGS}}

  # ── help ────────────────────────────────────────────────────
  help:
    desc: show usage and available options
    silent: true
    cmds:
      - echo ""
      - echo "Usage:"
      - echo "  task <command> [-- -flag1 -flag2]"
      - echo ""
      - echo "Commands & flags:"
      - echo "  task sync                git pull + crawl + generate public JSON"
      - echo "  task sync:nopull         crawl + generate public JSON (no git pull)"
      - echo "        -- -dry-run        crawl only, skip writing guilds.json"
      - echo "        -- -no-notify      skip Discord notification"
      - echo "        -- -force-role     reassign roles to all authors"
      - echo ""
      - echo "  task bot                 run bot (RUBY_CHANNEL_ID + DEV_CHANNEL_ID)"
      - echo "  task bot:no-claude       run bot without Claude (slash commands only)"
      - echo "  task bot:ollama          run bot with Qwen 2.5 7B Instruct (requires ollama running)"
      - echo "  task bot:mistral         run bot with Mistral 7B Instruct (requires ollama running)"
      - 'echo "        -- -ollama-model   set model name (for bot:ollama)"'
      - 'echo "        -- -ollama-url     set Ollama API URL (default: http://localhost:11434)"'
      - echo "  task bot:purge-commands  delete all slash commands from Discord (run once to clean up stale commands)"
      - echo ""
      - echo "  task send                post a message as Ruby (one-shot)"
      - echo "        -- \"text\"          message to send"
      - 'echo "        -- -channel ID     override channel (default: RUBY_CHANNEL_ID)"'
      - echo "        -- -image path     attach an image (text optional)"
      - echo ""
      - echo "  task spotlight           post a random guild screenshot to the Ruby channel"
      - echo "        -- -guild name     spotlight a specific guild (substring match)"
      - echo ""
      - echo "  task event-show          post events starting in the next 4 hours"
      - 'echo "        -- -dev            post to DEV_CHANNEL_ID instead of GENERAL_CHANNEL_ID"'
      - echo ""
      - echo "  task react               add 👍 🔥 ❤️ ⭐ to every guild/solo forum first post"
      - echo "        -- -name name      only react to threads whose name contains this (case-insensitive)"
      - echo "        -- -solo           target the solo forum instead of guild forum"
      - echo "        -- -dry-run        fetch threads but skip adding reactions"
      - echo ""
      - echo "  task announce            test-post a general-channel announcement card"
      - echo "        -- -guild name     guild/solo name to announce (substring match)"
      - 'echo "        -- -channel ID     target channel (default: GENERAL_CHANNEL_ID)"'
      - echo "        -- -solo           search solos instead of guilds"
      - echo "        -- -screenshots    use 'new screenshots' format instead of 'new entry'"
      - echo ""
      - echo "  task analyze             fetch guild reactions → voter_analysis.csv + .html"
      - echo ""
      - echo "  task check-abuse         detect concentrated voting (offline, reads data/reactions.json)"
      - echo "        -- -threshold 0.7  concentration threshold (default 0.70)"
      - echo "        -- -min-threads 3  minimum guilds voted on before flagging (default 3)"
      - echo ""
      - echo "  task events-sync         fetch Discord Scheduled Events → data/events.json"
      - echo ""
      - echo "  task web                 start Astro dev server"
      - echo "  task web:build           build Astro for production"
      - echo "  task web:preview         preview production build"
      - echo ""
      - echo "  task test                run unit tests"
      - echo "  task vet                 run go vet on all packages"
      - echo "  task push                vet + test + git push"
      - echo ""
      - echo "Examples:"
      - echo "  task sync -- -dry-run"
      - echo "  task sync -- -no-notify -force-role"
      - echo "  task sync -- -dry-run -no-notify -force-role"
      - echo ""