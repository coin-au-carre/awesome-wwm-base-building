# Taskfile.yml
version: '3'

tasks:
  # ── codegen ────────────────────────────────────────────────
  generate:
    desc: generate markdown pages and inject README
    cmd: go run ./cmd/generate {{.CLI_ARGS}}

  # ── discord sync (one-shot) ─────────────────────────────────
  sync:
    desc: crawl Discord threads → update guilds.json
    cmds:
      - git pull
      - go run ./cmd/sync {{.CLI_ARGS}}

  # ── bot (long-running) ──────────────────────────────────────
  bot:
    desc: run the long-running Discord bot (dev)
    cmd: go run ./cmd/bot {{.CLI_ARGS}}

  bot:build:
    desc: build bot binary for VPS deployment
    cmd: GOOS=linux GOARCH=amd64 go build -o dist/bot ./cmd/bot

  bot:deploy:
    desc: build and scp binary to VPS, restart service
    deps: [bot:build]
    cmds:
      - scp dist/bot {{.VPS_USER}}@{{.VPS_HOST}}:/opt/ruby/bot
      - ssh {{.VPS_USER}}@{{.VPS_HOST}} "systemctl restart ruby-bot"
    vars:
      VPS_USER: '{{.VPS_USER | default "deploy"}}'
      VPS_HOST: '{{.VPS_HOST | default "your.vps.host"}}'

  # ── combined ────────────────────────────────────────────────
  all:
    desc: full sync + generate cycle (used by cron)
    cmds:
      - task: sync
      - task: generate

  all:push:
    desc: full cycle + git push
    cmds:
      - task: all
      - task: push

  # ── dev / ci ────────────────────────────────────────────────
  vet:
    desc: run go vet on all packages
    cmd: go vet ./...

  push:
    desc: vet then push
    deps: [vet]
    cmd: git push {{.CLI_ARGS}}

  # ── help ────────────────────────────────────────────────────
  help:
    desc: show usage and available options
    silent: true
    cmds:
      - echo ""
      - echo "Usage:"
      - echo "  task <command> [-- -flag1 -flag2]"
      - echo ""
      - echo "Commands & flags:"
      - echo "  task generate"
      - echo "        -- -clean          remove stale guild pages"
      - echo ""
      - echo "  task sync"
      - echo "        -- -dry-run        crawl only, skip writing guilds.json"
      - echo "        -- -no-notify      skip Discord notification"
      - echo "        -- -force-role     reassign Base Builder role to all authors"
      - echo ""
      - echo "  task bot                 run long-running bot (dev)"
      - echo "  task bot:build           build Linux binary → dist/bot"
      - echo "  task bot:deploy          build + scp + restart systemd service"
      - echo ""
      - echo "  task all                 sync + generate"
      - echo "  task all:push            sync + generate + git push"
      - echo "  task push                vet + git push"
      - echo ""
      - echo "Examples:"
      - echo "  task sync -- -dry-run"
      - echo "  task sync -- -no-notify -force-role"
      - echo "  task sync -- -dry-run -no-notify -force-role"
      - echo "  task generate -- -clean"
      - echo "  task bot:deploy VPS_USER=ubuntu VPS_HOST=1.2.3.4"
      - echo ""