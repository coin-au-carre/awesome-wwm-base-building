# Taskfile.yml
version: '3'

tasks:
  # ── discord sync (one-shot) ─────────────────────────────────
  sync:
    desc: git pull, crawl Discord threads → update guilds.json, generate public JSON, sync tutorials, sync bugs, sync patch notes
    cmds:
      - git pull
      - go run ./cmd/sync {{.CLI_ARGS}}
      - go run ./cmd/genjson
      - go run ./cmd/tutorial -list data/tutorial_threads.txt -refresh-videos -refresh-images
      - go run ./cmd/whatever-sync
      - go run ./cmd/bugs-sync
      - go run ./cmd/patches-sync

  sync:nopull:
    desc: crawl Discord threads → update guilds.json, generate public JSON, sync tutorials, sync bugs, sync patch notes (no git pull)
    cmds:
      - go run ./cmd/sync {{.CLI_ARGS}}
      - go run ./cmd/genjson
      - go run ./cmd/tutorial -list data/tutorial_threads.txt -refresh-videos -refresh-images
      - go run ./cmd/whatever-sync
      - go run ./cmd/bugs-sync
      - go run ./cmd/patches-sync

  sync:bugs:
    desc: fetch Google Sheets bugs CSV → data/bugs.json (with Discord CDN refresh)
    cmd: go run ./cmd/bugs-sync {{.CLI_ARGS}}

  sync:patches:
    desc: fetch Google Sheets patch notes CSV → data/patches.json (with Discord CDN refresh)
    cmd: go run ./cmd/patches-sync {{.CLI_ARGS}}

  sync:guilds:
    desc: sync guild forum only (no git pull, no tutorial/whatever-sync)
    cmds:
      - go run ./cmd/sync -only guilds {{.CLI_ARGS}}
      - go run ./cmd/genjson

  sync:solo:
    desc: sync solo forum only (no git pull, no tutorial/whatever-sync)
    cmds:
      - go run ./cmd/sync -only solo {{.CLI_ARGS}}
      - go run ./cmd/genjson

  sync:blueprints:
    desc: sync blueprint forum only (no git pull, no tutorial/whatever-sync)
    cmds:
      - go run ./cmd/sync -only blueprints {{.CLI_ARGS}}
      - go run ./cmd/genjson

  sync:interiors:
    desc: sync interior design forum only (no git pull, no tutorial/whatever-sync)
    cmds:
      - go run ./cmd/sync -only interiors {{.CLI_ARGS}}
      - go run ./cmd/genjson

  # ── bot (long-running) ──────────────────────────────────────
  bot:
    desc: run the bot (responds on RUBY_CHANNEL_ID and DEV_CHANNEL_ID)
    cmd: go run ./cmd/bot {{.CLI_ARGS}}

  bot:no-claude:
    desc: run the bot without Claude responses (slash commands only)
    cmd: go run ./cmd/bot -no-claude {{.CLI_ARGS}}

  bot:ollama:
    desc: run the bot with local Ollama (Qwen 2.5 7B Instruct)
    cmd: go run ./cmd/bot -ollama -ollama-model qwen2.5:7b-instruct-q5_K_M {{.CLI_ARGS}}

  bot:mistral:
    desc: run the bot with Mistral 7B Instruct
    cmd: go run ./cmd/bot -ollama -ollama-model mistral:7b-instruct-q5_K_M {{.CLI_ARGS}}

  # ── voter analysis (one-shot) ───────────────────────────────
  analyze:
    desc: "fetch guild reactions → data/voter_analysis.csv + data/voter_analysis.html"
    cmd: go run ./cmd/analyze {{.CLI_ARGS}}

  # ── abuse detection (offline) ───────────────────────────────
  check-abuse:
    desc: "detect concentrated voting from data/reactions.json (no Discord required)"
    cmd: go run ./cmd/check-abuse {{.CLI_ARGS}}

  # ── events sync (one-shot) ──────────────────────────────────
  events-sync:
    desc: fetch Discord Scheduled Events → data/events.json
    cmd: go run ./cmd/events-sync {{.CLI_ARGS}}

  whatever-sync:
    desc: fetch #whatever-showcase messages → data/whatever.json
    cmd: go run ./cmd/whatever-sync {{.CLI_ARGS}}

  cn-news-sync:
    desc: scrape CN server news & announcements from yysls.cn → data/cn_news.json
    cmd: go run ./cmd/cn-news-sync {{.CLI_ARGS}}

  flyer:update:
    desc: refresh Discord CDN tokens in docs/events/community-flyer.html from local data files
    cmd: python3 docs/events/update-flyer-urls.py

  # ── send (one-shot message as Ruby) ────────────────────────
  send:
    desc: "send a message (or image) as Ruby. Usage: task send -- [-channel <id>] [-image path] \"text\""
    cmd: go run ./cmd/send {{.CLI_ARGS}}

  # ── spotlight (random guild image post) ─────────────────────
  spotlight:
    desc: "post a guild screenshot to the Ruby channel. Use -- -guild <name> for a specific guild"
    cmd: go run ./cmd/spotlight {{.CLI_ARGS}}

  # ── event-show (post upcoming events) ──────────────────────
  event-show:
    desc: "post events starting in the next 4 hours to Discord. Use -- -dev for DEV_CHANNEL_ID"
    cmd: go run ./cmd/event-show {{.CLI_ARGS}}

  # ── react (seed emoji reactions on forum posts) ────────────
  react:
    desc: "add 👍 🔥 ❤️ ⭐ to the first post of every thread in the guild or solo forum. Use -- -solo for solo channel"
    cmd: go run ./cmd/react {{.CLI_ARGS}}

  # ── numreact (add :one:…:N: to a specific message) ─────────
  numreact:
    desc: "add :one: through :N: reactions to a Discord message. Usage: task numreact -- <url> -n <N>"
    cmd: go run ./cmd/numreact {{.CLI_ARGS}}

  # ── purge-commands (one-shot Discord command cleanup) ───────
  bot:purge-commands:
    desc: delete all registered Discord slash commands (global + guild), then restart bot to re-register
    cmd: go run ./cmd/purge-commands {{.CLI_ARGS}}

  # ── discord:servers (list servers the bot is in) ───────────────────
  discord:servers:
    desc: list all Discord servers the bot is in, with invite links
    cmd: go run ./cmd/discord-servers

  # ── assign-roles (force-assign builder role to all forum authors) ──
  assign-roles:
    desc: "force-assign the builder role to all forum authors, ignoring role cache"
    cmd: go run ./cmd/assign-roles

  # ── announce (test general-channel announcement card) ────────
  announce:
    desc: "test-post a new-guild announcement card. Usage: task announce -- -guild <name> [-channel <id>] [-solo] [-screenshots]"
    cmd: go run ./cmd/announce {{.CLI_ARGS}}

  # ── sim-submit (simulate /submit-guild DM in dev channel) ────
  sim-submit:
    desc: "simulate the DM Ruby sends after /submit-guild. Usage: task sim-submit -- [-name \"Guild [ID]\"] [-builders \"B1, B2\"] [-lore \"...\"] [-what-to-visit \"...\"] [-channel <id>]"
    cmd: go run ./cmd/sim-submit {{.CLI_ARGS}}


  # ── tutorial (generate article from Discord thread) ─────────
  tutorial:
    desc: "generate/refresh markdown tutorials. Usage: task tutorial -- [<url>...] [-refresh-videos] [-refresh-images]"
    cmd: go run ./cmd/tutorial -list data/tutorial_threads.txt {{.CLI_ARGS}}

  # ── web (Astro) ─────────────────────────────────────────────
  web:
    desc: start Astro dev server (http://localhost:4321)
    dir: web
    cmd: npm run dev

  web:build:
    desc: build Astro site for production (outputs to web/dist/)
    dir: web
    cmd: npm run build

  web:preview:
    desc: preview the production Astro build locally
    dir: web
    cmd: npm run preview

  # ── dev / ci ────────────────────────────────────────────────
  test:
    desc: run unit tests
    cmd: go test ./... {{.CLI_ARGS}}

  vet:
    desc: run go vet on all packages
    cmd: go vet ./...

  push:
    desc: vet, test, then push
    deps: [vet, test]
    cmd: git push {{.CLI_ARGS}}

  # ── help ────────────────────────────────────────────────────
  help:
    desc: show usage and available options
    silent: true
    cmds:
      - echo ""
      - echo "Usage:"
      - echo "  task <command> [-- -flag1 -flag2]"
      - echo ""
      - echo "Commands & flags:"
      - echo "  task sync                git pull + crawl all channels + genjson + tutorials"
      - echo "  task sync:nopull         same, no git pull"
      - echo "  task sync:guilds         guild forum only + genjson (no pull, no tutorials/bugs/patches)"
      - echo "  task sync:solo           solo forum only  + genjson (no pull, no tutorials)"
      - echo "  task sync:blueprints     blueprint forum only + genjson (no pull, no tutorials)"
      - echo "  task sync:interiors      interior design forum only + genjson (no pull, no tutorials)"
      - echo "        -- -dry-run        crawl only, skip writing JSON files"
      - echo "        -- -no-notify      skip Discord notification"
